# Source configuration for deterministic inbox collectors.
# Schedules remain in Hermes cron jobs; mutable progress remains under state/.

[inbox]
output_dir = "vault/content/inbox"
timezone = "America/Los_Angeles"

[youtube]

# Use canonical YouTube channel IDs (values beginning with "UC").
[[youtube.channels]]
id = "UCEOv-8wHvYC6mzsY2Gm5WcQ"
name = "Empire"
enabled = true

[[youtube.channels]]
id = "UCEAwYFRFUuekaEmKz4oiB_A"
name = "1000x"
enabled = true

[substack]
initial_backfill_limit = 5

[[substack.publications]]
handle = "cryptonarratives"
enabled = true

[[substack.publications]]
handle = "degentradingdaily"
enabled = true

[[substack.publications]]
handle = "cryptohayes"
enabled = true

[telegram]
session_file = "sessions/telegram-ingest"
download_media = true

[[telegram.channels]]
username = "cryptonarratives1"
name = "Crypto Narratives"
enabled = true
